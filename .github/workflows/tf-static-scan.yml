name: Terraform Static Scan

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/tf-static-scan.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/tf-static-scan.yml"

permissions:
  contents: read

jobs:
  terraform-static-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@f0796e7f3d6bec5d40aecb0321ed8012f5602f84 # v1.0.2
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
          DNS_PROXY_LOGANALYTICSSHAREDKEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Trivy Terraform Security Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          scan-ref: terraform/aws
          trivyignores: terraform/aws/.trivyignore
          exit-code: 1
          ignore-unfixed: false
          version: v0.69.3